# Concave CMS — self-hosted frontend packaging
#
# Backend: deploy Convex functions to Convex Cloud (see docs/self-hosted.md).
# This compose file runs the TanStack Start production server only.
#
# Usage:
#   cp .env.example .env
#   # Edit .env with your Convex URLs and auth secrets
#   docker compose up --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_CONVEX_URL: ${VITE_CONVEX_URL}
        VITE_CONVEX_SITE_URL: ${VITE_CONVEX_SITE_URL:-}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      PREVIEW_SECRET: ${PREVIEW_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
